
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live2D Girl</title>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.x/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
</style>
</head>

<body>

<script>
const app = new PIXI.Application({
    view: document.body,
    resizeTo: window
});

const modelUrl = "xch011_01.model3.json";

PIXI.live2d.Live2DModel.from(modelUrl)
.then(model => {

    console.log("Model loaded ✅");

    model.scale.set(0.35);
    model.anchor.set(0.5, 0.5);
    model.x = window.innerWidth / 2;
    model.y = window.innerHeight / 1.5;

    app.stage.addChild(model);

    // 👀 Look at cursor
    window.addEventListener("mousemove", e => {
        let x = (e.clientX / window.innerWidth - 0.5) * 2;
        let y = (e.clientY / window.innerHeight - 0.5) * 2;

        model.internalModel.coreModel.setParameterValueById("ParamAngleX", x * 30);
        model.internalModel.coreModel.setParameterValueById("ParamAngleY", y * 30);
        model.internalModel.coreModel.setParameterValueById("ParamBodyAngleX", x * 10);
    });

    // 🎬 Idle animation on start
    model.motion("Idle", 0);

    // 👆 Click = play tap animation
    window.addEventListener("click", () => {
        model.motion("TapBody", 0);
    });

})
.catch(err => {
    console.error("ERROR ❌", err);
});
</script>

    
</body>
</html>
