<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live2D Fix</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.8/browser/pixi.min.js"></script>
<script src="https://unpkg.com/pixi-live2d-display/dist/cubism4.min.js"></script>
<script src="https://unpkg.com/pixi-live2d-display/dist/index.min.js"></script>

<style>
body {
    margin: 0;
    background: black;
}
canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<script>
const app = new PIXI.Application({
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: 0x000000
});

document.body.appendChild(app.view); // 🔥 IMPORTANT FIX

const modelUrl = "xch011_01.model3.json";

PIXI.live2d.Live2DModel.from(modelUrl)
.then(model => {

    document.body.style.background = "green"; // debug

    model.scale.set(0.3);
    model.x = window.innerWidth / 2;
    model.y = window.innerHeight * 0.8;

    model.anchor.set(0.5, 1);

    app.stage.addChild(model);

    model.motion("Idle", 0);

})
.catch(err => {
    console.error(err);
    document.body.style.background = "red";
});
</script>

</body>
</html>
