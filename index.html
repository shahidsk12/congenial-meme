<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live2D Debug</title>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
}
#log {
  position: fixed;
  top: 0;
  left: 0;
  padding: 10px;
  font-size: 14px;
  z-index: 999;
}
.green { color: lime; }
.red { color: red; }
</style>
</head>

<body>

<div id="log"></div>
<canvas id="canvas"></canvas>

<script>
const log = document.getElementById("log");

function addLog(text, ok) {
  const div = document.createElement("div");
  div.textContent = text;
  div.className = ok ? "green" : "red";
  log.appendChild(div);
}

async function checkFile(url, name) {
  try {
    const res = await fetch(url);
    if (res.ok) {
      addLog(name + " FOUND", true);
      return true;
    } else {
      addLog(name + " NOT FOUND", false);
      return false;
    }
  } catch {
    addLog(name + " ERROR", false);
    return false;
  }
}

(async function () {

  const base = "https://cdn.jsdelivr.net/gh/shahidsk12/congenial-meme@main/";

  await checkFile(base + "xch011_01.model3.json", "model3.json");
  await checkFile(base + "xch011_01.moc3", "moc3");
  await checkFile(base + "textures/texture_00.png", "texture");
  await checkFile(base + "motions/idle.motion3.json", "idle motion");
  await checkFile(base + "motions/touch1.motion3.json", "touch motion");

  const app = new PIXI.Application({
    view: document.getElementById("canvas"),
    resizeTo: window
  });

  try {
    const model = await PIXI.live2d.Live2DModel.from(
      base + "xch011_01.model3.json"
    );

    addLog("MODEL LOADED SUCCESS", true);

    app.stage.addChild(model);

    model.scale.set(0.35);
    model.anchor.set(0.5, 1);
    model.x = window.innerWidth / 2;
    model.y = window.innerHeight;

    model.motion("Idle", 0);

    window.addEventListener("click", () => {
      model.motion("TapBody", 0);
    });

  } catch (err) {
    addLog("MODEL LOAD FAILED", false);
    console.error(err);
  }

})();
</script>

</body>
</html>
