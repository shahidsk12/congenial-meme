<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live2D Girl</title>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.x/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
</style>
</head>

<body>

<script>
const app = new PIXI.Application({
    view: document.body,
    resizeTo: window
});

const modelUrl = "xch011_01.model3.json";

PIXI.live2d.Live2DModel.from(modelUrl)
.then(model => {

    document.body.style.background = "green"; // ✅ DEBUG (see if it changes)

    model.scale.set(0.35);
    model.anchor.set(0.5, 0.5);
    model.x = window.innerWidth / 2;
    model.y = window.innerHeight / 1.5;

    app.stage.addChild(model);

    model.motion("Idle", 0);

})
.catch(err => {
    document.body.style.background = "red"; // ❌ ERROR indicator
});
</script>

</body>
</html>
