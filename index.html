<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live2D xch011_01</title>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/index.min.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>
(async function () {

  const app = new PIXI.Application({
    view: document.getElementById("canvas"),
    resizeTo: window
  });

  const model = await PIXI.live2d.Live2DModel.from(
    "https://cdn.jsdelivr.net/gh/shahidsk12/congenial-meme@main/xch011_01.model3.json"
  );

  app.stage.addChild(model);

  model.scale.set(0.35);
  model.anchor.set(0.5, 1);
  model.x = window.innerWidth / 2;
  model.y = window.innerHeight;

  model.motion("Idle", 0);

  window.addEventListener("click", () => {
    model.motion("TapBody", 0);
  });

  window.addEventListener("mousemove", e => {
    let x = (e.clientX / window.innerWidth - 0.5) * 2;
    let y = (e.clientY / window.innerHeight - 0.5) * 2;

    model.internalModel.coreModel.setParameterValueById("ParamAngleX", x * 30);
    model.internalModel.coreModel.setParameterValueById("ParamAngleY", y * 30);
  });

  window.addEventListener("touchmove", e => {
    let x = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
    let y = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;

    model.internalModel.coreModel.setParameterValueById("ParamAngleX", x * 30);
    model.internalModel.coreModel.setParameterValueById("ParamAngleY", y * 30);
  });

})();
</script>

</body>
</html>
